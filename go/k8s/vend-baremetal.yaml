# Bare-metal PVC version — requires local-path-provisioner:
#   kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: vend-vnet
  labels:
    name: vend-vnet

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vend-local-storage
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer

---

# vend-vnet: was DaemonSet, now StatefulSet with anti-affinity for one-per-node
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: vend-vnet
  name: vend-vnet
  labels:
    app: vend-vnet
spec:
  serviceName: vend-vnet
  replicas: 2
  selector:
    matchLabels:
      app: vend-vnet
  template:
    metadata:
      labels:
        app: vend-vnet
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: vend-vnet
              topologyKey: kubernetes.io/hostname
      containers:
        - name: vend-vnet
          image: saichler/vendmachine-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: vend-local-storage
        resources:
          requests:
            storage: 5Gi

