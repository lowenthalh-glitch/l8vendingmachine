# GKE deployment — uses GCE Persistent Disk StorageClass with a single shared PVC
# All services share the "vend" namespace so they can reference the same PVC.

apiVersion: v1
kind: Namespace
metadata:
  name: vend
  labels:
    name: vend

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vend-storage
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-standard
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: vend
  name: vend-data
  labels:
    app: vend
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: vend-storage
  resources:
    requests:
      storage: 50Gi

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: vend
  name: vend-vnet
  labels:
    app: vend-vnet
spec:
  selector:
    matchLabels:
      app: vend-vnet
  template:
    metadata:
      labels:
        app: vend-vnet
    spec:
      hostNetwork: true
      containers:
        - name: vend-vnet
          image: saichler/vendmachine-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: vend-data

