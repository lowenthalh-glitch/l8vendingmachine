# KIND cluster version — uses KIND's built-in standard StorageClass
# KIND ships with rancher/local-path-provisioner pre-installed as StorageClass "standard"
# No custom StorageClass definition needed.

apiVersion: v1
kind: Namespace
metadata:
  name: vend-vnet
  labels:
    name: vend-vnet

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: vend-vnet
  name: vend-vnet
  labels:
    app: vend-vnet
spec:
  serviceName: vend-vnet
  replicas: 2
  selector:
    matchLabels:
      app: vend-vnet
  template:
    metadata:
      labels:
        app: vend-vnet
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: vend-vnet
              topologyKey: kubernetes.io/hostname
      containers:
        - name: vend-vnet
          image: saichler/vendmachine-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

