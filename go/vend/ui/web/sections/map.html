<div class="section-container map-section l8-section">
    <div style="display:flex; align-items:center; gap:12px; padding:16px 24px; border-bottom:1px solid var(--layer8d-border);">
        <span style="font-size:28px;">🗺️</span>
        <div>
            <h1 style="margin:0; font-size:20px; color:var(--layer8d-text-dark);">Austin TX — Fleet Map</h1>
            <p style="margin:0; font-size:13px; color:var(--layer8d-text-muted);">Facilities, Machines, Locations, Trucks & Drivers</p>
        </div>
        <div style="margin-left:auto; display:flex; gap:8px; flex-wrap:wrap;" id="map-legend">
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;"><span style="display:inline-block;width:12px;height:12px;background:#e74c3c;border-radius:50%;"></span> Facilities</span>
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;"><span style="display:inline-block;width:12px;height:12px;background:#3498db;border-radius:50%;"></span> Locations</span>
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;"><span style="display:inline-block;width:12px;height:12px;background:#9b59b6;border-radius:50%;"></span> Machines</span>
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;"><span style="display:inline-block;width:12px;height:12px;background:#2ecc71;border-radius:50%;"></span> Trucks</span>
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;"><span style="display:inline-block;width:12px;height:12px;background:#f39c12;border-radius:50%;"></span> Drivers</span>
        </div>
    </div>
    <div id="vend-map" style="width:100%; height:calc(100vh - 140px);"></div>
</div>
