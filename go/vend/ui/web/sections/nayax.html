<div class="section-container nayax-section l8-section">
    <!-- Hero Header with animated vending machine illustrations (GPU pattern) -->
    <div class="l8-header-frame parallax-container" id="nayax-hero">
        <div class="l8-header-bg parallax-layer" data-speed="0.5">
            <svg class="l8-illustration" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="vmGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.2"/>
                    </linearGradient>
                    <linearGradient id="vmGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.3"/>
                        <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
                    </linearGradient>
                    <filter id="vmGlow">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>

                <!-- Grid -->
                <g opacity="0.06">
                    <line x1="0" y1="75" x2="1200" y2="75" stroke="#0ea5e9" stroke-width="0.5"/>
                    <line x1="0" y1="150" x2="1200" y2="150" stroke="#0ea5e9" stroke-width="0.5"/>
                    <line x1="0" y1="225" x2="1200" y2="225" stroke="#0ea5e9" stroke-width="0.5"/>
                    <line x1="300" y1="0" x2="300" y2="300" stroke="#0ea5e9" stroke-width="0.5"/>
                    <line x1="600" y1="0" x2="600" y2="300" stroke="#0ea5e9" stroke-width="0.5"/>
                    <line x1="900" y1="0" x2="900" y2="300" stroke="#0ea5e9" stroke-width="0.5"/>
                </g>

                <!-- Vending Machine 1 - Snack -->
                <g class="parallax-card" data-speed="1.2">
                    <rect x="60" y="50" width="100" height="190" rx="6" fill="url(#vmGrad1)" filter="url(#vmGlow)" stroke="#0ea5e9" stroke-width="0.5" opacity="0.8"/>
                    <rect x="70" y="62" width="80" height="65" rx="3" fill="#0ea5e9" opacity="0.12"/>
                    <rect x="75" y="68" width="33" height="22" rx="2" fill="#0ea5e9" opacity="0.35"/>
                    <rect x="112" y="68" width="33" height="22" rx="2" fill="#0ea5e9" opacity="0.3"/>
                    <rect x="75" y="94" width="33" height="22" rx="2" fill="#0ea5e9" opacity="0.25"/>
                    <rect x="112" y="94" width="33" height="22" rx="2" fill="#0ea5e9" opacity="0.4"/>
                    <rect x="70" y="135" width="80" height="35" rx="3" fill="#0ea5e9" opacity="0.15"/>
                    <circle cx="110" cy="152" r="10" fill="#0ea5e9" opacity="0.2"/>
                    <rect x="80" y="180" width="60" height="10" rx="2" fill="#0ea5e9" opacity="0.2"/>
                    <text x="110" y="210" text-anchor="middle" fill="#0ea5e9" font-size="9" opacity="0.5" font-family="monospace">SNACK</text>
                    <circle cx="72" y="225" r="3" fill="#00ff41"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
                </g>

                <!-- Vending Machine 2 - Drink -->
                <g class="parallax-card" data-speed="1.5">
                    <rect x="280" y="65" width="100" height="180" rx="6" fill="url(#vmGrad2)" filter="url(#vmGlow)" stroke="#38bdf8" stroke-width="0.5" opacity="0.7"/>
                    <rect x="290" y="77" width="80" height="60" rx="3" fill="#38bdf8" opacity="0.1"/>
                    <rect x="295" y="83" width="33" height="20" rx="2" fill="#38bdf8" opacity="0.3"/>
                    <rect x="332" y="83" width="33" height="20" rx="2" fill="#38bdf8" opacity="0.35"/>
                    <rect x="295" y="107" width="33" height="20" rx="2" fill="#38bdf8" opacity="0.4"/>
                    <rect x="332" y="107" width="33" height="20" rx="2" fill="#38bdf8" opacity="0.25"/>
                    <rect x="290" y="145" width="80" height="30" rx="3" fill="#38bdf8" opacity="0.15"/>
                    <circle cx="330" cy="160" r="8" fill="#38bdf8" opacity="0.2"/>
                    <text x="330" y="205" text-anchor="middle" fill="#38bdf8" font-size="9" opacity="0.5" font-family="monospace">DRINK</text>
                    <circle cx="292" y="220" r="3" fill="#00ff41"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
                </g>

                <!-- Central Cloud -->
                <g>
                    <ellipse cx="600" cy="130" rx="90" ry="45" fill="url(#vmGrad1)" opacity="0.35"/>
                    <ellipse cx="600" cy="120" rx="70" ry="30" fill="#0ea5e9" opacity="0.15"/>
                    <text x="600" y="128" text-anchor="middle" fill="#0ea5e9" font-size="13" opacity="0.5" font-family="monospace">MGMT</text>
                    <circle cx="600" cy="175" r="0" fill="none" stroke="#38bdf8" stroke-width="1">
                        <animate attributeName="r" values="5;35;5" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
                    </circle>
                </g>

                <!-- Vending Machine 3 - Coffee -->
                <g class="parallax-card" data-speed="1.8">
                    <rect x="820" y="55" width="100" height="185" rx="6" fill="url(#vmGrad1)" filter="url(#vmGlow)" stroke="#0ea5e9" stroke-width="0.5" opacity="0.75"/>
                    <rect x="830" y="67" width="80" height="60" rx="3" fill="#0ea5e9" opacity="0.12"/>
                    <rect x="835" y="73" width="70" height="18" rx="2" fill="#0ea5e9" opacity="0.3"/>
                    <rect x="835" y="95" width="70" height="18" rx="2" fill="#0ea5e9" opacity="0.35"/>
                    <rect x="830" y="135" width="80" height="35" rx="3" fill="#0ea5e9" opacity="0.15"/>
                    <circle cx="870" cy="152" r="12" fill="#0ea5e9" opacity="0.2"/>
                    <text x="870" y="210" text-anchor="middle" fill="#0ea5e9" font-size="9" opacity="0.5" font-family="monospace">COFFEE</text>
                    <circle cx="832" y="220" r="3" fill="#f59e0b"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/></circle>
                </g>

                <!-- Vending Machine 4 - EV Charger -->
                <g class="parallax-card" data-speed="1.3">
                    <rect x="1040" y="70" width="100" height="170" rx="6" fill="url(#vmGrad2)" filter="url(#vmGlow)" stroke="#38bdf8" stroke-width="0.5" opacity="0.7"/>
                    <rect x="1050" y="82" width="80" height="55" rx="3" fill="#38bdf8" opacity="0.1"/>
                    <rect x="1055" y="88" width="70" height="40" rx="2" fill="#38bdf8" opacity="0.2"/>
                    <rect x="1050" y="145" width="80" height="25" rx="3" fill="#38bdf8" opacity="0.15"/>
                    <text x="1090" y="205" text-anchor="middle" fill="#38bdf8" font-size="9" opacity="0.5" font-family="monospace">EV</text>
                    <circle cx="1052" y="218" r="3" fill="#ef4444"><animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/></circle>
                </g>

                <!-- Connection lines -->
                <g opacity="0.3">
                    <line x1="160" y1="145" x2="530" y2="130" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4">
                        <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
                    </line>
                    <line x1="380" y1="155" x2="540" y2="135" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,4">
                        <animate attributeName="stroke-dashoffset" values="0;8" dur="1.2s" repeatCount="indefinite"/>
                    </line>
                    <line x1="660" y1="130" x2="820" y2="145" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4">
                        <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
                    </line>
                    <line x1="660" y1="135" x2="1040" y2="155" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,4">
                        <animate attributeName="stroke-dashoffset" values="0;8" dur="1.3s" repeatCount="indefinite"/>
                    </line>
                </g>

                <!-- Data particles -->
                <circle r="3" fill="#38bdf8"><animate attributeName="cx" values="160;530" dur="2.5s" repeatCount="indefinite"/><animate attributeName="cy" values="145;130" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/></circle>
                <circle r="3" fill="#0ea5e9"><animate attributeName="cx" values="660;820" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" values="130;145" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite"/></circle>

                <!-- Status bars -->
                <g transform="translate(480, 220)">
                    <text x="0" y="0" fill="#0ea5e9" font-size="8" opacity="0.4" font-family="monospace">ONLINE</text>
                    <rect x="45" y="-8" width="80" height="8" rx="2" fill="#0ea5e9" opacity="0.1"/>
                    <rect x="45" y="-8" width="68" height="8" rx="2" fill="#00ff41" opacity="0.4">
                        <animate attributeName="width" values="68;72;68" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    <text x="130" y="0" fill="#00ff41" font-size="8" opacity="0.5" font-family="monospace">86%</text>
                </g>
                <g transform="translate(480, 240)">
                    <text x="0" y="0" fill="#0ea5e9" font-size="8" opacity="0.4" font-family="monospace">STOCK</text>
                    <rect x="45" y="-8" width="80" height="8" rx="2" fill="#0ea5e9" opacity="0.1"/>
                    <rect x="45" y="-8" width="55" height="8" rx="2" fill="#f59e0b" opacity="0.4">
                        <animate attributeName="width" values="55;50;55" dur="4s" repeatCount="indefinite"/>
                    </rect>
                    <text x="130" y="0" fill="#f59e0b" font-size="8" opacity="0.5" font-family="monospace">69%</text>
                </g>
            </svg>
        </div>

        <div class="l8-header-content parallax-layer" data-speed="1">
            <div class="l8-header-title">
                <div class="l8-icon">
                    <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                        <rect x="8" y="5" width="34" height="40" rx="4" fill="none" stroke="#0ea5e9" stroke-width="2"/>
                        <rect x="13" y="10" width="24" height="12" rx="2" fill="#0ea5e9" opacity="0.4"/>
                        <rect x="15" y="13" width="9" height="6" rx="1" fill="#0ea5e9" opacity="0.6"/>
                        <rect x="26" y="13" width="9" height="6" rx="1" fill="#0ea5e9" opacity="0.5"/>
                        <rect x="13" y="26" width="24" height="8" rx="2" fill="#0ea5e9" opacity="0.3"/>
                        <circle cx="25" cy="30" r="2.5" fill="#0ea5e9" opacity="0.4"/>
                        <circle cx="14" cy="40" r="1.5" fill="#00ff41"/>
                    </svg>
                </div>
                <div>
                    <h1 class="l8-title">Management Systems</h1>
                    <p class="l8-subtitle">Real-time Vending Machine Fleet Monitoring</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Data table -->
    <div class="section-content">
        <div class="l8-module-content active" data-module="machines">
            <div class="l8-service-view active" data-service="machines">
                <div class="l8-table-container" id="machines-machines-table-container"></div>
            </div>
            <div class="l8-service-view" data-service="machine-groups">
                <div class="l8-table-container" id="machines-machine-groups-table-container"></div>
            </div>
            <div class="l8-service-view" data-service="locations">
                <div class="l8-table-container" id="machines-locations-table-container"></div>
            </div>
        </div>
    </div>
</div>
