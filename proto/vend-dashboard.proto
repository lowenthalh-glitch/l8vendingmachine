syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// Child: KPI threshold definition
message VendKPIThreshold {
    string threshold_id = 1;
    string name = 2;
    string operator = 3;
    double value = 4;
    VendAlertSeverity severity = 5;
    bool is_active = 6;
}

// @PrimeObject
message VendKPI {
    string kpi_id = 1;
    string code = 2;
    string name = 3;
    string description = 4;
    string category = 5;
    string unit = 6;
    string calculation_formula = 7;
    double current_value = 8;
    double target_value = 9;
    double previous_value = 10;
    VendKPIStatus status = 11;
    VendKPITrend trend = 12;
    int32 refresh_interval = 13;
    int64 last_triggered = 14;
    repeated VendKPIThreshold thresholds = 15;
    map<string, string> custom_fields = 16;
    l8common.AuditInfo audit_info = 17;
}

message VendKPIList {
    repeated VendKPI list = 1;
    l8api.L8MetaData metadata = 2;
}

// Child: Dashboard widget configuration
message VendDashboardWidget {
    string widget_id = 1;
    string widget_type = 2;
    string title = 3;
    int32 position_x = 4;
    int32 position_y = 5;
    int32 width = 6;
    int32 height = 7;
    string data_source = 8;
    string query = 9;
    string config = 10;
}

// @PrimeObject
message VendDashboard {
    string dashboard_id = 1;
    string name = 2;
    string description = 3;
    string owner_id = 4;
    string layout_config = 5;
    int32 refresh_interval = 6;
    bool is_default = 7;
    repeated VendDashboardWidget widgets = 8;
    map<string, string> custom_fields = 9;
    l8common.AuditInfo audit_info = 10;
}

message VendDashboardList {
    repeated VendDashboard list = 1;
    l8api.L8MetaData metadata = 2;
}
