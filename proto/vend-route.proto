syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// @PrimeObject
message VendRoute {
    string route_id = 1;
    string name = 2;
    string description = 3;
    VendRouteStatus status = 4;
    string driver_id = 5;                // cross-ref: VendDriver
    string vehicle_id = 6;
    int64 planned_date = 7;
    int64 actual_start = 8;
    int64 actual_end = 9;
    double total_distance = 10;
    int32 total_duration = 11;
    repeated VendRouteStop stops = 12;   // Child: embedded route stops
    map<string, string> custom_fields = 13;
    l8common.AuditInfo audit_info = 14;
    string facility_id = 15;             // cross-ref: VendStockingFacility (primary facility)
    double estimated_fuel_cost = 16;     // distance / MPG * fuel price
}

message VendRouteList {
    repeated VendRoute list = 1;
    l8api.L8MetaData metadata = 2;
}

// Child type (NOT a Prime Object) -- embedded in VendRoute
message VendRouteStop {
    int32 stop_order = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    int64 planned_arrival = 3;
    int64 actual_arrival = 4;
    string status = 5;
    string restock_order_id = 6;         // cross-ref: VendRestockOrder
    string service_urgency = 7;
    string stop_type = 8;               // "machine" or "reload"
    string facility_id = 9;             // Only set for reload stops
}

// @PrimeObject
message VendDriver {
    string driver_id = 1;
    string first_name = 2;
    string last_name = 3;
    string phone = 4;
    string email = 5;

    // License
    string license_number = 6;
    VendLicenseClass license_class = 12;

    // Assignment
    string truck_id = 7;                 // cross-ref: VendDeliveryTruck
    string home_base_location_id = 8;    // cross-ref: VendLocation
    bool is_active = 9;
    int64 hire_date = 13;

    // Home address
    l8common.Address home_address = 14;

    // Current location (updated when driver's device connects)
    double current_latitude = 16;
    double current_longitude = 17;
    int64 last_location_update = 18;

    // Weekly schedule
    repeated VendDriverScheduleDay schedule = 15;

    map<string, string> custom_fields = 10;
    l8common.AuditInfo audit_info = 11;
}

// Child type (NOT a Prime Object) -- embedded in VendDriver
// One entry per working day, with start time and optional alternate start location.
message VendDriverScheduleDay {
    VendDayOfWeek day = 1;
    string start_time = 2;               // "HH:MM" format (e.g., "07:30")
    string start_location_id = 3;        // cross-ref: VendLocation (blank = home address)
}

message VendDriverList {
    repeated VendDriver list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject
message VendDeliveryTruck {
    string truck_id = 1;
    string plate_number = 2;
    string vin = 3;
    string name = 4;

    // Vehicle Specs
    string make = 5;
    string model = 6;
    int32 year = 7;
    VendTruckType type = 8;
    int32 cargo_capacity_cu_ft = 9;
    int32 max_payload_lbs = 10;
    VendFuelType fuel_type = 11;
    int32 mileage = 12;
    double miles_per_gallon = 13;

    // Status
    VendTruckStatus status = 14;
    string current_driver_id = 15;       // cross-ref: VendDriver
    string current_route_id = 16;        // cross-ref: VendRoute
    string home_depot_id = 17;           // cross-ref: VendStockingFacility

    // Location
    double last_latitude = 18;
    double last_longitude = 19;
    int64 last_location_update = 20;

    // Maintenance
    int64 last_maintenance_date = 21;
    int64 next_maintenance_date = 22;
    int32 next_maintenance_mileage = 23;
    int64 insurance_expiry = 24;
    int64 registration_expiry = 25;

    // Capacity Tracking
    bool refrigeration_equipped = 26;
    bool cash_collection_equipped = 27;
    bool coin_changer_equipped = 28;

    // Stock carried on the truck
    repeated VendTruckStockItem stock = 29;

    // Audit
    map<string, string> custom_fields = 30;
    l8common.AuditInfo audit_info = 31;
}

// Child type (NOT a Prime Object) -- embedded in VendDeliveryTruck
// Matches the product catalog from the Nayax management system simulator.
message VendTruckStockItem {
    string product_name = 1;
    string sku = 2;
    int64 price = 3;                     // cents
    int32 quantity = 4;                  // units currently on the truck
    int32 max_quantity = 5;              // max units the truck can carry for this product
}

message VendDeliveryTruckList {
    repeated VendDeliveryTruck list = 1;
    l8api.L8MetaData metadata = 2;
}

// Command message for on-demand route optimization (no List type — not a CRUD entity)
message VendRouteOptRequest {
    // Input
    int64 planned_date = 1;              // Unix timestamp, default = tomorrow
    int64 start_time = 2;               // Unix timestamp for departure (for traffic query)
    double max_route_distance = 3;       // Max miles per route, default = 50
    double max_detour_distance = 4;      // Max detour for List B machines, default = 3
    int32 reload_time_minutes = 5;       // Time to reload at facility, default = 30

    // Output (populated by optimizer, returned in POST response)
    repeated string generated_route_ids = 10;
    int32 generated_count = 11;
    int32 list_a_count = 12;             // Machines that needed immediate restock
    int32 list_b_added = 13;             // "Can wait" machines added opportunistically
    string error = 14;                   // Error message if generation failed
}
