syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// @PrimeObject
message VendStockingFacility {
    string facility_id = 1;
    string name = 2;
    string code = 3;

    // Location
    l8common.Address address = 4;
    VendGpsCoordinates coordinates = 5;
    string timezone = 6;

    // Capacity
    int32 total_storage_sq_ft = 7;
    int32 refrigerated_storage_sq_ft = 8;
    int32 loading_docks = 9;
    int32 max_trucks_parked = 10;

    // Operations
    VendFacilityStatus status = 11;
    string operating_hours_start = 12;   // "HH:MM"
    string operating_hours_end = 13;     // "HH:MM"
    repeated VendDayOfWeek operating_days = 14;

    // Stock
    repeated VendFacilityStockItem stock = 15;

    // Contacts
    string manager_name = 16;
    string manager_phone = 17;
    string manager_email = 18;

    map<string, string> custom_fields = 19;
    l8common.AuditInfo audit_info = 20;
}

// Child type (NOT a Prime Object) -- embedded in VendStockingFacility
// Matches the product catalog from the Nayax management system simulator.
message VendFacilityStockItem {
    string product_name = 1;
    string sku = 2;
    int64 price = 3;                     // cents
    int32 quantity = 4;
    int32 max_quantity = 5;
    int32 reorder_point = 6;             // trigger purchase order below this level
}

message VendStockingFacilityList {
    repeated VendStockingFacility list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject
message VendSupplier {
    string supplier_id = 1;
    string name = 2;
    string contact_name = 3;
    string contact_phone = 4;
    string contact_email = 5;
    l8common.Address address = 6;
    int32 lead_time_days = 7;
    string payment_terms = 8;
    VendSupplierStatus status = 9;
    map<string, string> custom_fields = 10;
    l8common.AuditInfo audit_info = 11;
}

message VendSupplierList {
    repeated VendSupplier list = 1;
    l8api.L8MetaData metadata = 2;
}

// Child: Purchase order line item
message VendPurchaseOrderLine {
    int32 line_number = 1;
    string product_id = 2;               // cross-ref: VendProduct
    int32 quantity_ordered = 3;
    int32 quantity_received = 4;
    l8common.Money unit_price = 5;
}

// @PrimeObject
message VendPurchaseOrder {
    string order_id = 1;
    string supplier_id = 2;              // cross-ref: VendSupplier
    string facility_id = 3;             // cross-ref: VendStockingFacility
    VendPurchaseOrderStatus status = 4;
    int64 order_date = 5;
    int64 expected_delivery = 6;
    int64 actual_delivery = 7;
    l8common.Money total_amount = 8;
    repeated VendPurchaseOrderLine lines = 9;
    string notes = 10;
    map<string, string> custom_fields = 11;
    l8common.AuditInfo audit_info = 12;
}

message VendPurchaseOrderList {
    repeated VendPurchaseOrder list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject
message VendStockMovement {
    string movement_id = 1;
    string facility_id = 2;             // cross-ref: VendStockingFacility
    string product_id = 3;               // cross-ref: VendProduct
    VendMovementType movement_type = 4;
    int32 quantity = 5;
    string reference_id = 6;
    int64 timestamp = 7;
    string performed_by = 8;
    string notes = 9;
    map<string, string> custom_fields = 10;
    l8common.AuditInfo audit_info = 11;
}

message VendStockMovementList {
    repeated VendStockMovement list = 1;
    l8api.L8MetaData metadata = 2;
}

// Child: Vehicle load line item
message VendVehicleLoadLine {
    string product_id = 1;               // cross-ref: VendProduct
    int32 quantity_loaded = 2;
    int32 quantity_returned = 3;
    int32 quantity_dispensed = 4;
}

// @PrimeObject
message VendVehicleLoad {
    string load_id = 1;
    string route_id = 2;                 // cross-ref: VendRoute
    string driver_id = 3;                // cross-ref: VendDriver
    string vehicle_id = 4;              // cross-ref: VendDeliveryTruck
    int64 load_date = 5;
    VendVehicleLoadStatus status = 6;
    repeated VendVehicleLoadLine lines = 7;
    map<string, string> custom_fields = 8;
    l8common.AuditInfo audit_info = 9;
}

message VendVehicleLoadList {
    repeated VendVehicleLoad list = 1;
    l8api.L8MetaData metadata = 2;
}
