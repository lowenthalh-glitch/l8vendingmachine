syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// @PrimeObject
message VendTempReading {
    string reading_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    int64 timestamp = 3;
    string zone_id = 4;
    string zone_name = 5;
    VendTemperatureZoneType zone_type = 6;
    double current_temp = 7;
    double setpoint = 8;
    double min_temp = 9;
    double max_temp = 10;
    bool compressor_running = 11;
    double compressor_duty_cycle = 12;
    bool defrost_active = 13;
    string compliance_status = 14;
    map<string, string> custom_fields = 15;
    l8common.AuditInfo audit_info = 16;
}

message VendTempReadingList {
    repeated VendTempReading list = 1;
    l8api.L8MetaData metadata = 2;
}
