// ============================================================================
// SHARED NON-PRIME-OBJECT TYPES
// ============================================================================

// VendConnectivity represents the connectivity details for a vending machine
message VendConnectivity {
  string connection_type = 1;
  string carrier = 2;
  int32 signal_strength = 3;
  string ip_address = 4;
  bool wifi_backup = 5;
}

// VendGpsCoordinates represents geographic coordinates
message VendGpsCoordinates {
  double latitude = 1;
  double longitude = 2;
}
