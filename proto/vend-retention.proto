syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// @PrimeObject — Immutable archived copy of VendTransaction
message VendArchivedTransaction {
    string transaction_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    int64 timestamp = 3;
    string slot_id = 4;
    string product_id = 5;               // cross-ref: VendProduct
    string product_name = 6;
    VendProductCategory category = 7;
    l8common.Money price = 8;
    VendPaymentMethod payment_method = 9;
    VendTransactionStatus status = 10;
    string card_type = 11;
    string card_last_four = 12;
    double dispense_duration = 13;
    string error_code = 14;
    string location_id = 15;             // cross-ref: VendLocation
    int64 archived_at = 16;
    string archived_by = 17;
    string archive_reason = 18;
    map<string, string> custom_fields = 19;
    l8common.AuditInfo audit_info = 20;
}

message VendArchivedTransactionList {
    repeated VendArchivedTransaction list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject — Immutable archived copy of VendTempReading
message VendArchivedTempReading {
    string reading_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    int64 timestamp = 3;
    string zone_id = 4;
    VendTemperatureZoneType zone_type = 5;
    double current_temp = 6;
    double setpoint = 7;
    bool compressor_running = 8;
    string compliance_status = 9;
    int64 archived_at = 10;
    string archived_by = 11;
    string archive_reason = 12;
    map<string, string> custom_fields = 13;
    l8common.AuditInfo audit_info = 14;
}

message VendArchivedTempReadingList {
    repeated VendArchivedTempReading list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject — Immutable archived copy of VendAccessEvent
message VendArchivedAccessEvent {
    string event_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    int64 timestamp = 3;
    VendAccessEventType event_type = 4;
    string door_id = 5;
    string cell_id = 6;
    int32 duration = 7;
    string operator_id = 8;
    int64 archived_at = 9;
    string archived_by = 10;
    string archive_reason = 11;
    map<string, string> custom_fields = 12;
    l8common.AuditInfo audit_info = 13;
}

message VendArchivedAccessEventList {
    repeated VendArchivedAccessEvent list = 1;
    l8api.L8MetaData metadata = 2;
}
