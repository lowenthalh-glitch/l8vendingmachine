syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// @PrimeObject
message VendForecast {
    string forecast_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    string product_id = 3;               // cross-ref: VendProduct
    int64 forecast_date = 4;
    int32 horizon_days = 5;
    double predicted_daily_vends = 6;
    int64 predicted_stockout_time = 7;
    string restock_urgency = 8;
    double confidence_score = 9;
    map<string, string> custom_fields = 10;
    l8common.AuditInfo audit_info = 11;
}

message VendForecastList {
    repeated VendForecast list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject
message VendSlotPerformance {
    string performance_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    string slot_id = 3;
    string product_id = 4;               // cross-ref: VendProduct
    string product_name = 5;
    int64 period_start = 6;
    int64 period_end = 7;
    int32 vend_count = 8;
    l8common.Money revenue = 9;
    double velocity = 10;
    int32 rank = 11;
    double margin = 12;
    double stockout_hours = 13;
    int32 approaches = 14;
    double conversion_rate = 15;
    map<string, string> custom_fields = 16;
    l8common.AuditInfo audit_info = 17;
}

message VendSlotPerformanceList {
    repeated VendSlotPerformance list = 1;
    l8api.L8MetaData metadata = 2;
}

// @PrimeObject
message VendFleetInventory {
    string summary_id = 1;
    string product_id = 2;               // cross-ref: VendProduct
    string product_name = 3;
    VendProductCategory category = 4;
    l8common.Money unit_price = 5;
    int32 total_machines = 6;
    int32 total_slots = 7;
    int32 total_units_in_machines = 8;
    int32 total_capacity = 9;
    int32 total_units_in_warehouses = 10;
    int32 total_supply_chain = 11;
    int32 fleet_sold_out_count = 12;
    int32 fleet_low_stock_count = 13;
    int64 last_updated = 14;
    map<string, string> custom_fields = 15;
    l8common.AuditInfo audit_info = 16;
}

message VendFleetInventoryList {
    repeated VendFleetInventory list = 1;
    l8api.L8MetaData metadata = 2;
}

message VendInventorySnapshot {
    string snapshot_id = 1;
    string machine_id = 2;
    string machine_name = 3;
    int64 timestamp = 4;
    int32 total_stock = 5;
    int32 total_capacity = 6;
    int32 fill_pct = 7;
    int32 empty_slots = 8;
    int32 low_stock_slots = 9;
    int32 total_slots = 10;
    int64 revenue = 11;
    int64 daily_revenue = 12;
}

message VendInventorySnapshotList {
    repeated VendInventorySnapshot list = 1;
    l8api.L8MetaData metadata = 2;
}

message VendTopPerformer {
    string performer_id = 1;
    string machine_id = 2;
    string machine_name = 3;
    int64 revenue_30d = 4;
    int32 avg_fill_pct = 5;
    int32 total_snapshots = 6;
    int32 rank = 7;
    int64 last_updated = 8;
}

message VendTopPerformerList {
    repeated VendTopPerformer list = 1;
    l8api.L8MetaData metadata = 2;
}

message VendProductProfile {
    string product_name = 1;
    double depletion_rate_per_hour = 2;
    int64 price = 3;
    int32 avg_stock = 4;
    int32 capacity = 5;
    double time_to_empty_hours = 6;
}

message VendMachineProfile {
    string profile_id = 1;
    string machine_id = 2;
    string machine_name = 3;
    int64 last_updated = 4;

    // Day-of-week depletion rates (fill% drop per hour, index 0=Sun..6=Sat)
    repeated double dow_depletion_rate = 10;
    repeated int32 dow_sample_count = 11;

    // Hour-of-day depletion rates (24 entries)
    repeated double hod_depletion_rate = 12;
    repeated int32 hod_sample_count = 13;

    // Overall metrics (rolling 30-day)
    double avg_hourly_depletion = 20;
    double avg_daily_revenue = 21;
    int64 total_revenue_30d = 22;
    int32 avg_fill_pct = 23;
    int32 restock_count_30d = 24;
    double avg_restock_interval_hours = 25;

    // Location classification
    string location_class = 30;
    double weekend_weekday_ratio = 31;

    // Per-product depletion rates
    repeated VendProductProfile top_products = 40;

    // Trend
    double trend_multiplier = 50;

    // Cascade threshold
    int32 cascade_threshold_pct = 60;
}

message VendMachineProfileList {
    repeated VendMachineProfile list = 1;
    l8api.L8MetaData metadata = 2;
}

enum VendRestockPriority {
    VEND_RESTOCK_PRIORITY_UNSPECIFIED = 0;
    VEND_RESTOCK_PRIORITY_LOW = 1;
    VEND_RESTOCK_PRIORITY_MEDIUM = 2;
    VEND_RESTOCK_PRIORITY_HIGH = 3;
    VEND_RESTOCK_PRIORITY_CRITICAL = 4;
}

enum VendRestockReasonCode {
    VEND_RESTOCK_REASON_UNSPECIFIED = 0;
    VEND_RESTOCK_REASON_WEEKEND_DEMAND = 1;
    VEND_RESTOCK_REASON_WEEKDAY_DEMAND = 2;
    VEND_RESTOCK_REASON_RUSH_HOUR = 3;
    VEND_RESTOCK_REASON_FAST_MOVER_EMPTY = 4;
    VEND_RESTOCK_REASON_CASCADE_THRESHOLD = 5;
    VEND_RESTOCK_REASON_ROUTE_GROUPING = 6;
    VEND_RESTOCK_REASON_SEASONAL_TREND = 7;
    VEND_RESTOCK_REASON_EVENT_DRIVEN = 8;
    VEND_RESTOCK_REASON_REVENUE_AT_RISK = 9;
    VEND_RESTOCK_REASON_CRITICAL_PREDICTION = 10;
}

message VendRestockItem {
    string product_name = 1;
    int32 current_stock = 2;
    int32 capacity = 3;
    int32 units_to_add = 4;
    double depletion_rate = 5;
}

message VendRestockRecommendation {
    string recommendation_id = 1;
    string machine_id = 2;
    string machine_name = 3;
    string location = 4;
    VendRestockPriority priority = 5;
    string reason = 6;
    VendRestockReasonCode reason_code = 7;
    int64 predicted_empty_time = 8;
    int32 current_fill_pct = 9;
    int32 projected_fill_pct = 10;
    int64 revenue_at_risk = 11;
    repeated VendRestockItem suggested_products = 12;
    string route_group_id = 13;
    double confidence = 14;
    int64 created_at = 15;
    int64 expires_at = 16;
    int32 revenue_rank = 17;
    int64 avg_daily_revenue = 18;
    string location_class = 19;
}

message VendRestockRecommendationList {
    repeated VendRestockRecommendation list = 1;
    l8api.L8MetaData metadata = 2;
}
