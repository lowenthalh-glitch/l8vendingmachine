syntax = "proto3";

package vend;

option go_package = "./types/vend";

import "vend-common.proto";
import "l8common.proto";
import "api.proto";

// @PrimeObject -- Immutable (rejects PUT)
message VendAccessEvent {
    string event_id = 1;
    string machine_id = 2;               // cross-ref: VendMachine
    int64 timestamp = 3;
    VendAccessEventType event_type = 4;
    string door_id = 5;
    string cell_id = 6;
    int32 duration = 7;
    string operator_id = 8;
    repeated string activities = 9;
    map<string, string> custom_fields = 10;
    l8common.AuditInfo audit_info = 11;
}

message VendAccessEventList {
    repeated VendAccessEvent list = 1;
    l8api.L8MetaData metadata = 2;
}
